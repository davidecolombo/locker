name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build and test
        run: mvn clean install

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/locker.jar
            dist/locker.ps1
            dist/locker.sh
